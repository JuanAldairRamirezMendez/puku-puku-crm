services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: puku_puku_crm
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - puku_puku_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/puku_puku_crm?schema=public
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/puku_puku_crm?schema=public
      JWT_SECRET: ${JWT_SECRET:-cambia_esto_en_produccion}
      JWT_EXPIRES_IN: 8h
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-cambia_esto_tambien}
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:80}
      CHURN_INACTIVITY_DAYS: 30
    ports:
      - "${API_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  web:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  puku_puku_pgdata:
