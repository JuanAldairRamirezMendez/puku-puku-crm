services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: puku_puku_crm
    ports:
      - "5432:5432"
    volumes:
      - puku_puku_pgdata:/var/lib/postgresql/data

volumes:
  puku_puku_pgdata:
