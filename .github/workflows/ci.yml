name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 22

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: puku_puku_crm_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ── Backend ──
      - name: Backend — Install
        working-directory: backend
        run: npm ci

      - name: Backend — Lint
        working-directory: backend
        run: npm run lint --if-present

      - name: Backend — Generate Prisma client
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/puku_puku_crm_test?schema=public
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/puku_puku_crm_test?schema=public

      - name: Backend — Migrate
        working-directory: backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/puku_puku_crm_test?schema=public
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/puku_puku_crm_test?schema=public

      - name: Backend — Test
        working-directory: backend
        run: npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/puku_puku_crm_test?schema=public
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/puku_puku_crm_test?schema=public
          JWT_SECRET: test-secret
          JWT_REFRESH_SECRET: test-refresh-secret

      # ── Frontend ──
      - name: Frontend — Install
        working-directory: frontend
        run: npm ci

      - name: Frontend — Lint
        working-directory: frontend
        run: npm run lint --if-present

      - name: Frontend — Test
        working-directory: frontend
        run: npm test

      - name: Frontend — Build
        working-directory: frontend
        run: npm run build

  docker:
    # Opcional: build de imágenes Docker multi-plataforma
    # Se ejecuta solo en push a main (no en PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: lint-test-build

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKER_REGISTRY }}/puku-puku-api:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKER_REGISTRY }}/puku-puku-web:latest

      - name: Trigger Render deploy
        if: secrets.RENDER_DEPLOY_HOOK != ''
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
